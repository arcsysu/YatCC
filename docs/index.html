<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YatCC 文档入口说明</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #0f172a;
        color: #e2e8f0;
      }

      main {
        width: min(720px, 100%);
        padding: 28px;
        border-radius: 20px;
        background: rgba(15, 23, 42, 0.88);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.35);
      }

      h1 {
        margin: 0 0 16px;
        font-size: 1.8rem;
      }

      p,
      li {
        line-height: 1.7;
      }

      code {
        padding: 0.12rem 0.38rem;
        border-radius: 0.4rem;
        background: rgba(148, 163, 184, 0.14);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>这是旧的 Docsify 源入口，不再作为线上文档首页使用。</h1>
      <p>当前文档站已经迁移到 MkDocs Material。请将反向代理指向已发布站点的首页，而不是仓库源码中的 <code>docs/index.html</code>。</p>
      <p>如果需要查看旧框架备份，请阅读 <code>docs/archive/legacy-docsify-framework.md</code>。</p>
      <ul>
        <li>如果你代理的是 GitHub Pages 或其他已发布静态站点，<code>site/</code> 是否被 git ignore 不会影响访问。</li>
        <li>如果你代理的是仓库源码目录或分支文件内容，那么会命中这个旧入口页，而不是 MkDocs 构建后的首页。</li>
      </ul>
    </main>
  </body>
</html>
