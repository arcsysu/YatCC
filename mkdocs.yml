site_name: YatCC 实验文档
site_description: YatCC course documentation migrated from Docsify to MkDocs Material.
repo_url: https://github.com/arcsysu/YatCC
repo_name: arcsysu/YatCC
docs_dir: docs
strict: true
validation:
  nav:
    omitted_files: ignore
  links:
    unrecognized_links: ignore
    anchors: ignore
theme:
  name: material
  custom_dir: docs/overrides
  language: zh
  logo: images/logo/icon-white.png
  favicon: images/logo/icon-white.png
  font:
    text: false
    code: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.footer
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.select
    - toc.follow
plugins:
  - search
markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
extra_css:
  - stylesheets/fonts.css
  - stylesheets/extra.css
  - stylesheets/agent.css
  - https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css
extra_javascript:
  - https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/contrib/auto-render.min.js
  - javascripts/katex.js
  - javascripts/navigation-accordion.js
  - javascripts/image-lightbox.js
exclude_docs: |
  index.html
  _sidebar.md
  _navbar.md
  README.md
nav:
  - 主页:
    - 首页: index.md
    - 项目介绍: home/project.md
    - 常见问题与答案: QA.md
    - 文档开发指南: home/development.md
    - 主要贡献者: contributors.md
  - 实验指引:
    - 导览: introduction/index.md
    - 环境与流程:
      - 环境配置: introduction/environment.md
      - 实验框架使用方法: introduction/howtouse.md
      - 最终评测方式说明: introduction/finalscore.md
    - AI 与辅助工具:
      - AI 工具使用方法: introduction/agent.md
      - vibe coding指南: introduction/vibecoding.md
      - 大模型提示工程: introduction/prompt.md
    - 参与与反馈:
      - 帮助我们改进实验: introduction/helptoimprove.md
  - 实验内容:
    - 总览: labs/index.md
    - Task0:
      - 实验介绍: task0_doc/task0.md
    - Task1:
      - 实验介绍: task1_doc/overview.md
      - 使用 flex 完成 Task1: task1_doc/flex.md
      - 使用 antlr 完成 Task1: task1_doc/antlr.md
      - Prompt 示例: task1_doc/prompt.md
      - API 速查: task1_doc/apidoc.md
    - Task2:
      - 实验介绍: task2_doc/overview.md
      - 公用代码介绍: task2_doc/share.md
      - 使用 bison 完成 Task2: task2_doc/bison.md
      - 使用 antlr 完成 Task2: task2_doc/antlr.md
      - Prompt 示例: task2_doc/prompt.md
    - Task3:
      - 实验介绍: task3_doc/overview.md
      - EmitIR 介绍: task3_doc/emitir.md
      - LLVM 介绍: task3_doc/llvm.md
      - 上手教程: task3_doc/start.md
      - Prompt 示例: task3_doc/prompt.md
      - LLVM API: task3_doc/apidoc.md
    - Task4:
      - 实验介绍: task4_doc/overview.md
      - 代码框架介绍: task4_doc/framework.md
      - 优化算法: task4_doc/optimizations.md
      - Prompt 示例: task4_doc/prompt.md
      - API 速查: task4_doc/apidoc.md
    - Task5:
      - 整体介绍: task5_doc/overview.md
